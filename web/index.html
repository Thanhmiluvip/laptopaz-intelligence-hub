<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaptopAZ | Intelligence Hub v2.0</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f10;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --accent-muted: #88888b;
            --blue: #0071e3;
            --green: #34c759;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--accent);
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Layout --- */
        .app-container { max-width: 1300px; margin: 0 auto; padding: 80px 24px; }

        /* --- Header Section --- */
        .hero { margin-bottom: 64px; text-align: left; }
        .hero h1 { 
            font-size: 4rem; font-weight: 700; margin: 0; letter-spacing: -0.04em; 
            background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero p { color: var(--accent-muted); font-size: 1.1rem; margin-top: 12px; }

        /* --- Bento Stats --- */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 40px; }
        .stat-card { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 24px;
            backdrop-filter: blur(10px);
        }
        .stat-card .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-muted); }
        .stat-card .value { font-size: 1.8rem; font-weight: 600; margin-top: 8px; display: block; }

        /* --- Control Center --- */
        .control-center {
            position: sticky; top: 24px; z-index: 1000;
            background: rgba(15, 15, 16, 0.7); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 12px; display: flex; gap: 12px; align-items: center;
            margin-bottom: 48px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .search-wrap { flex: 1; display: flex; align-items: center; gap: 12px; padding-left: 16px; color: var(--accent-muted); }
        .search-wrap input { 
            background: transparent; border: none; color: #fff; font-size: 1rem; width: 100%; outline: none; 
        }
        .filter-group { display: flex; gap: 8px; }
        select { 
            background: #1a1a1b; border: 1px solid var(--border); color: #fff;
            padding: 10px 16px; border-radius: 16px; font-size: 0.9rem; outline: none; cursor: pointer;
        }

        /* --- Product Grid --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px; }
        
        .product-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 28px;
            padding: 32px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between; height: 100%;
        }
        .product-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,0,0,0.2); }
        
        .card-tag { font-size: 0.7rem; font-weight: 700; color: var(--green); text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
        .card-tag::before { content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }

        .product-name { font-size: 1.25rem; font-weight: 600; line-height: 1.4; color: #fff; margin-bottom: 24px; min-height: 2.8em; }
        
        .price-box { border-top: 1px solid var(--border); padding-top: 24px; display: flex; justify-content: space-between; align-items: flex-end; }
        .price-value { font-size: 1.75rem; font-weight: 700; color: #fff; }
        .price-label { font-size: 0.75rem; color: var(--accent-muted); margin-bottom: 4px; }

        .btn-action {
            background: #fff; color: #000; padding: 10px 20px; border-radius: 100px;
            text-decoration: none; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px;
        }
        .btn-action:hover { opacity: 0.9; transform: scale(1.05); }

        /* --- Skeleton & States --- */
        .skeleton { background: linear-gradient(90deg, #111 25%, #1a1a1b 50%, #111 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 20px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .empty-state { grid-column: 1/-1; text-align: center; padding: 100px 0; color: var(--accent-muted); }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .control-center { flex-direction: column; align-items: stretch; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="hero">
        <h1>Laptop Intelligence.</h1>
        <p>Hệ thống giám sát dữ liệu thời gian thực cho LaptopAZ Hà Đông.</p>
    </header>

    <div class="stats-row">
        <div class="stat-card">
            <span class="label">Sản phẩm khả dụng</span>
            <span class="value" id="countVal">0</span>
        </div>
        <div class="stat-card">
            <span class="label">Phân khúc trung bình</span>
            <span class="value" id="avgVal">0</span>
        </div>
        <div class="stat-card">
            <span class="label">Tình trạng hệ thống</span>
            <span class="value" style="color: var(--green); font-size: 1.2rem;">● Hoạt động</span>
        </div>
    </div>

    <nav class="control-center">
        <div class="search-wrap">
            <i data-lucide="search" size="20"></i>
            <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên, chip, hoặc cấu hình..." onkeyup="filterData()">
        </div>
        <div class="filter-group">
            <select id="priceFilter" onchange="filterData()">
                <option value="all">Tất cả giá</option>
                <option value="0-20">Dưới 20 Tr</option>
                <option value="20-40">20 - 40 Tr</option>
                <option value="40-100">Trên 40 Tr</option>
            </select>
            <select id="sortFilter" onchange="filterData()">
                <option value="desc">Giá: Cao → Thấp</option>
                <option value="asc">Giá: Thấp → Cao</option>
            </select>
        </div>
    </nav>

    <div id="productGrid" class="grid">
        <div class="product-card skeleton" style="height: 300px;"></div>
        <div class="product-card skeleton" style="height: 300px;"></div>
        <div class="product-card skeleton" style="height: 300px;"></div>
    </div>
</div>

<script>
    let products = [];
    const parsePrice = (p) => parseInt(p.replace(/\D/g, '')) || 0;
    const formatVND = (n) => new Intl.NumberFormat('vi-VN').format(n) + '₫';

    async function fetchData() {
        try {
            const res = await fetch('http://127.0.0.1:8000/api/inventory');
            const data = await res.json();
            if(data.status === 'success') {
                products = data.data;
                filterData();
            }
        } catch (e) {
            document.getElementById('productGrid').innerHTML = `<div class="empty-state">Kết nối thất bại. Hãy đảm bảo API đang chạy.</div>`;
        }
    }

    function filterData() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const pRange = document.getElementById('priceFilter').value;
        const sort = document.getElementById('sortFilter').value;

        let filtered = products.filter(i => {
            if (i.Price === "Liên hệ" || i.StockStatus === "Không xác định") return false;
            const p = parsePrice(i.Price);
            const matchesSearch = i.ProductName.toLowerCase().includes(query);
            let matchesPrice = true;
            if(pRange === '0-20') matchesPrice = p < 20000000;
            else if(pRange === '20-40') matchesPrice = p >= 20000000 && p <= 40000000;
            else if(pRange === '40-100') matchesPrice = p > 40000000;
            return matchesSearch && matchesPrice;
        });

        if(sort === 'desc') filtered.sort((a,b) => parsePrice(b.Price) - parsePrice(a.Price));
        else filtered.sort((a,b) => parsePrice(a.Price) - parsePrice(b.Price));

        updateUI(filtered);
    }

    function updateUI(data) {
        const grid = document.getElementById('productGrid');
        const count = document.getElementById('countVal');
        const avg = document.getElementById('avgVal');
        
        grid.innerHTML = '';
        if(data.length === 0) {
            grid.innerHTML = `<div class="empty-state">Không tìm thấy sản phẩm nào phù hợp với yêu cầu của bạn.</div>`;
        }

        count.innerText = data.length;
        const average = data.reduce((a, b) => a + parsePrice(b.Price), 0) / (data.length || 1);
        avg.innerText = formatVND(Math.round(average/1000000)*1000000).replace('₫', ' Tr');

        data.forEach(item => {
            grid.innerHTML += `
                <div class="product-card">
                    <div class="card-tag">${item.StockStatus}</div>
                    <h2 class="product-name">${item.ProductName}</h2>
                    <div class="price-box">
                        <div>
                            <div class="price-label">Giá ưu đãi</div>
                            <div class="price-value">${item.Price}</div>
                        </div>
                        <a href="${item.ProductURL}" target="_blank" class="btn-action">
                            Xem thêm <i data-lucide="arrow-up-right" size="16"></i>
                        </a>
                    </div>
                </div>
            `;
        });
        lucide.createIcons();
    }

    window.onload = fetchData;
</script>
</body>
</html>
